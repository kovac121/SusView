name: ESG News Fetcher

on:
  schedule:
    # 每天早上8点和下午2点运行 (UTC时间 = 北京时间-8)
    # 8:00 UTC = 16:00 北京时间
    # 14:00 UTC = 22:00 北京时间
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create news directory
        run: mkdir -p news

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser python-dateutil scrapling browserforge curl-cffi playwright
          playwright install chromium

      - name: Run ESG News Fetcher (main.py)
        env:
          LONGCAT_API_KEY: ${{ secrets.LONGCAT_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python main.py

      - name: Commit news
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news/latest.html
          git diff --staged --quiet || git commit -m "Update ESG news $(date '+%Y-%m-%d %H:%M')"
          git push
